services:

  merllm-api:
    build: ./api
    container_name: merllm-api
    restart: unless-stopped
    environment:
      # ── Ollama instances (GPU-pinned systemd services on host) ────────────
      OLLAMA_0_URL: "http://host.docker.internal:11434"
      OLLAMA_1_URL: "http://host.docker.internal:11435"

      # ── Model assignment ──────────────────────────────────────────────────
      DAY_MODEL_GPU0: "qwen3:32b"
      DAY_MODEL_GPU1: "qwen3:30b-a3b"
      NIGHT_MODEL:    "qwen3:32b"
      NIGHT_NUM_CTX:  "32768"

      # ── Scheduling ────────────────────────────────────────────────────────
      INACTIVITY_TIMEOUT_MIN: "90"
      BASE_DAY_END_LOCAL:     "22:00"

      # ── GeoIP ─────────────────────────────────────────────────────────────
      # Download GeoLite2-City.mmdb from MaxMind and place in ./data/
      GEOIP_DB_PATH: "/data/GeoLite2-City.mmdb"
      # GEOIP_OFFSET_OVERRIDE: "-5"   # uncomment to force a UTC offset

      # ── Ollama lifecycle ──────────────────────────────────────────────────
      # Set to "systemctl" to allow merLLM to start/stop ollama-gpu* services.
      # Requires the Docker socket mounted and appropriate host permissions.
      OLLAMA_MANAGE_VIA: "none"
      GPU0_SERVICE:   "ollama-gpu0"
      GPU1_SERVICE:   "ollama-gpu1"
      NIGHT_SERVICE:  "ollama-night"
      DRAIN_TIMEOUT_SEC: "300"

      # ── GPU metrics ──────────────────────────────────────────────────────
      LD_LIBRARY_PATH: "/usr/local/lib"

      # ── Storage ───────────────────────────────────────────────────────────
      DB_PATH:              "/data/merllm.db"
      METRICS_RETAIN_DAYS:  "7"
      METRICS_INTERVAL_SEC: "10"

      # ── SSH proxy (optional) ──────────────────────────────────────────────
      SSH_HOST:     "host.docker.internal"
      SSH_PORT:     "22"
      SSH_USER:     "lobulus"
      SSH_KEY_PATH: "/data/ssh_key"

      # ── VNC proxy (optional) ──────────────────────────────────────────────
      VNC_HOST: "host.docker.internal"
      VNC_PORT: "5901"

      # ── Fan controller ────────────────────────────────────────────────────
      # REST API exposed by the iDRAC fan controller container (api_server.py)
      FAN_CONTROLLER_URL: "http://host.docker.internal:8083"

    volumes:
      - merllm-data:/data
      - /usr/lib/x86_64-linux-gnu/libnvidia-ml.so.1:/usr/local/lib/libnvidia-ml.so.1:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/log/journal:/var/log/journal:ro

    devices:
      - /dev/nvidiactl:/dev/nvidiactl
      - /dev/nvidia0:/dev/nvidia0
      - /dev/nvidia1:/dev/nvidia1

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11400/api/merllm/status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    extra_hosts:
      - "host.docker.internal:host-gateway"

    networks:
      - merllm-net

    expose:
      - "11400"

  merllm-nginx:
    build: ./nginx
    container_name: merllm-nginx
    restart: unless-stopped
    ports:
      - "11400:11400"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./web:/usr/share/nginx/html/web:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11400/web/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    depends_on:
      - merllm-api
    networks:
      - merllm-net

volumes:
  merllm-data:

networks:
  merllm-net:
    driver: bridge
