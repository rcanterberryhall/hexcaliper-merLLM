services:

  merllm-api:
    build: ./api
    container_name: merllm-api
    restart: unless-stopped
    environment:
      # ── Ollama instances (GPU-pinned systemd services on host) ────────────
      OLLAMA_0_URL: "http://host.docker.internal:11434"
      OLLAMA_1_URL: "http://host.docker.internal:11435"

      # ── Model & GPU health ─────────────────────────────────────────────────
      DEFAULT_MODEL:        "qwen3:32b"
      RECLAIM_TIMEOUT:      "300"       # seconds idle before reclaiming to default model
      HEALTH_BACKOFF_BASE:  "10"        # initial health probe interval (seconds)
      HEALTH_BACKOFF_CAP:   "300"       # max health probe interval (seconds)
      HEALTH_FAULT_TIMEOUT: "1800"      # seconds until GPU declared faulted

      # ── GPU metrics ──────────────────────────────────────────────────────
      LD_LIBRARY_PATH: "/usr/local/lib"

      # ── Storage ───────────────────────────────────────────────────────────
      DB_PATH:              "/data/merllm.db"
      METRICS_RETAIN_DAYS:  "7"
      METRICS_INTERVAL_SEC: "10"

      # ── SSH proxy (optional) ──────────────────────────────────────────────
      SSH_HOST:     "host.docker.internal"
      SSH_PORT:     "22"
      SSH_USER:     "lobulus"
      SSH_KEY_PATH: "/data/ssh_key"

      # ── VNC proxy (optional) ──────────────────────────────────────────────
      VNC_HOST: "host.docker.internal"
      VNC_PORT: "5901"

      # ── Fan controller ────────────────────────────────────────────────────
      # REST API exposed by the iDRAC fan controller container (api_server.py)
      FAN_CONTROLLER_URL: "http://host.docker.internal:8083"

      # ── Extra disk monitoring ────────────────────────────────────────���────
      # Comma-separated label=path pairs for additional disks to monitor
      EXTRA_DISK_PATHS: "archive=/mnt/archive"

    volumes:
      - merllm-data:/data
      - /usr/lib/x86_64-linux-gnu/libnvidia-ml.so.1:/usr/local/lib/libnvidia-ml.so.1:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /media/lobulus/Archive:/mnt/archive:ro

    devices:
      - /dev/nvidiactl:/dev/nvidiactl
      - /dev/nvidia0:/dev/nvidia0
      - /dev/nvidia1:/dev/nvidia1

    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:11400/health', timeout=3).raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    extra_hosts:
      - "host.docker.internal:host-gateway"

    networks:
      - merllm-net

    expose:
      - "11400"

  merllm-nginx:
    build: ./nginx
    container_name: merllm-nginx
    restart: unless-stopped
    ports:
      - "11400:11400"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./web:/usr/share/nginx/html/web:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11400/web/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    depends_on:
      - merllm-api
    networks:
      - merllm-net

volumes:
  merllm-data:

networks:
  merllm-net:
    driver: bridge
