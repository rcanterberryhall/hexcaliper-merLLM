server {
    listen 11400;
    server_name _;

    client_max_body_size 25m;

    root /usr/share/nginx/html;
    index index.html;

    # WebSocket upgrade headers
    proxy_http_version 1.1;
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host       $host;
    proxy_set_header X-Real-IP  $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Cf-Access-Authenticated-User-Email $http_cf_access_authenticated_user_email;
    proxy_set_header Cf-Connecting-IP $http_cf_connecting_ip;

    # Long timeouts for LLM generation
    proxy_read_timeout 600s;
    proxy_send_timeout 600s;

    # WebSocket endpoints (SSH + VNC) — require CF Access authentication
    location /ws/ {
        resolver           127.0.0.11 valid=30s ipv6=off;
        set $upstream      merllm-api:11400;
        proxy_pass         http://$upstream;
        proxy_buffering    off;
    }

    # Health check
    location = /health {
        resolver           127.0.0.11 valid=30s ipv6=off;
        set $upstream      merllm-api:11400;
        proxy_pass         http://$upstream;
        proxy_buffering    off;
    }

    # API and Ollama proxy
    location /api/ {
        resolver           127.0.0.11 valid=30s ipv6=off;
        set $upstream      merllm-api:11400;
        proxy_pass         http://$upstream;
        proxy_buffering    off;
        proxy_cache        off;
    }

    # noVNC static assets (git source, ES modules, served from /novnc/core/)
    location /novnc/ {
        add_header Cache-Control "public, max-age=86400";
    }

    # Static web UI — no caching so updates are immediate
    location /web/ {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
        add_header CDN-Cache-Control "no-store";
        add_header Cloudflare-CDN-Cache-Control "no-store";
        try_files $uri $uri/ /web/index.html;
    }

    # Root → web UI
    location = / {
        return 302 /web/index.html;
    }
}
